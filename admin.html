<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GDLVS — Admin Console</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="icon" href="./assets/logo.svg" />
</head>
<body>
  <header class="site-header">
    <img src="./assets/logo.svg" alt="GDLVS Logo" class="logo" />
    <h1>Admin Console</h1>
    <nav><a href="./index.html">Public Portal</a></nav>
  </header>
  <main class="container">
    <section class="card" id="authCard">
      <h2>Sign In</h2>
      <form id="loginForm" class="grid">
        <label><span>Email</span><input id="email" type="email" required /></label>
        <label><span>Password</span><input id="password" type="password" required /></label>
        <button type="submit">Sign In</button>
      </form>
    </section>
    <section class="card" id="adminPanel" hidden>
      <div class="panel-header">
        <h2>Admin Tools</h2>
        <button id="signOut">Sign Out</button>
      </div>
      <details open class="block">
        <summary><strong>Add / Update License</strong></summary>
        <form id="upsertLicense" class="grid">
          <label><span>License Number*</span><input id="a_licenseNumber" type="text" required /></label>
          <label><span>Full Name*</span><input id="a_fullName" type="text" required /></label>
          <label><span>Date of Birth*</span><input id="a_dob" type="date" required /></label>
          <label><span>Status*</span><select id="a_status"><option value="valid">valid</option><option value="expired">expired</option></select></label>
          <button type="submit" class="col-span-2">Save</button>
        </form>
      </details>
    </section>
  </main>
  <footer class="site-footer">© <span id="year"></span> GDLVS Prototype</footer>
  <script type="module" src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js"></script>
  <script type="module" src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js"></script>
  <script type="module" src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js"></script>
  <script type="module" src="./firebase-config.js"></script>
  <script type="module" src="./admin.js"></script>
</body>
</html>
