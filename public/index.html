<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GDLVS — License Verification</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="icon" href="./assets/logo.svg" />
</head>
<body>
  <header class="site-header">
    <img src="./assets/logo.svg" alt="GDLVS Logo" class="logo" />
    <h1>Gabon Driver’s License Verification</h1>
    <nav>
      <a href="./admin.html">Admin</a>
      <a href="https://github.com/micaelngoma/GDLVS" target="_blank" rel="noopener">GitHub</a>
    </nav>
  </header>
  <main class="container">
    <section class="card">
      <h2>Verify a License</h2>
      <form id="verifyForm" class="grid">
        <label>
          <span>License Number</span>
          <input id="licenseNumber" type="text" placeholder="e.g., GAB-2020-123456" required />
        </label>
        <label>
          <span>Date of Birth</span>
          <input id="dob" type="date" required />
        </label>
        <button id="verifyBtn" type="submit">Verify</button>
      </form>
      <div id="result" class="result" hidden></div>
    </section>
    <section class="card muted">
      <h3>How this protects privacy</h3>
      <p>
        We do not query raw personal data. The portal hashes the License Number + Date of Birth
        in your browser and looks up a minimal, public record that contains only verification fields.
      </p>
    </section>
  </main>
  <footer class="site-footer">© <span id="year"></span> GDLVS Prototype</footer>
  <script type="module" src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js"></script>
  <script type="module" src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js"></script>
  <script type="module" src="./firebase-config.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
